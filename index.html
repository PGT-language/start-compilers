<!DOCTYPE html>
<html>
<head>
    <title>PGT Server</title>
</head>
<body>
    <h1>Hello from PGT Server</h1>
    <p>Send a message to the PGT server. The server saves the JSON payload through the Test ORM model.</p>
    <form id="api-form">
        <input type="text" name="message" placeholder="Enter message" required>
        <button type="submit">Send</button>
    </form>
    <pre id="response"></pre>
    <script>
        document.getElementById("api-form").addEventListener("submit", async (event) => {
            event.preventDefault();
            const form = event.currentTarget;
            const response = await fetch("/api", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: form.message.value })
            });
            form.reset();
            document.getElementById("response").textContent = await response.text();
        });
    </script>
</body>
</html>
